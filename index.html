<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/x-icon" href="icon.ico">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tanvir's InfoHub™</title>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans&display=swap" rel="stylesheet">
  <style>
    html, body {
      font-family: 'Google Sans', Arial, sans-serif;
      margin: 0;
      background-color: #f4f4f4;
      overflow-x: hidden;
      scrollbar-width: none;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    body::-webkit-scrollbar {
      display: none;
    }

    .header {
      position: fixed;
      top: 0;
      width: 100%;
      background-color: #fff;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      text-align: center;
      padding: 20px 0;
      border-radius: 0 0 20px 20px;
      z-index: 100;
    }

    .header img {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 80px;
      height: auto;
      z-index: 101;
    }

    .header h1 {
      margin: 0;
      font-size: 2em;
      color: #333;
    }

    .header p {
      margin: 5px 0 0;
      font-size: 1.2em;
      color: #777;
    }

    .search-bar {
      position: fixed;
      top: 100px;
      width: 100%;
      text-align: center;
      padding: 0;
      background-color: transparent;
      z-index: 99;
    }

    .search-container {
      position: relative;
      display: flex;
      align-items: center;
      width: 300px;
      margin: 0 auto;
      padding: 20px 0 5px;
    }

    .search-bar input {
      width: 100%;
      height: 40px;
      padding: 0 40px 0 15px;
      border: 1px solid #3ba36c;
      background-color: #2c2c2c;
      color: white;
      border-radius: 999px;
      font-size: 1em;
      outline: none;
      transition: border-color 0.3s ease;
    }

    .search-bar input:focus {
      border: 2px solid #A3F07B;
    }

    .search-bar input::placeholder {
      color: #ccc;
    }

    .clear-btn {
      position: absolute;
      right: 10px;
      color: #ccc;
      cursor: pointer;
      font-size: 20px;
      user-select: none;
      display: none;
    }

    .search-status {
      font-size: 1em;
      color: #666;
      margin-top: 5px;
      text-align: center;
      display: none;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 230px 20px 80px;
      flex: 1;
    }

    .card {
      background-color: white;
      border-radius: 20px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      width: 300px;
      overflow: hidden;
      padding: 20px;
      position: relative;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      height: 220px;
      transition: all 0.3s ease;
    }

    .card:hover {
      outline: 3px solid #A3F07B;
      outline-offset: 0px;
      border-radius: 20px;
      box-shadow: 0 0 10px #A3F07B;
    }

    .card-title {
      font-size: 1.25em;
      margin-bottom: 10px;
      color: #333;
      flex-shrink: 0;
    }

    .card-text {
      font-size: 0.95em;
      color: #555;
      overflow-y: auto;
      flex-grow: 1;
      padding-right: 10px;
      scrollbar-width: none;
    }

    .card-text::-webkit-scrollbar {
      display: none;
    }

    .footer {
      background: #fff;
      border-top: 1px solid #ccc;
      text-align: center;
      padding: 10px 0;
      font-size: 1em;
      color: #555;
      margin-top: auto;
      border-radius: 20px 20px 0 0;
      box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.05);
    }

    .footer a {
      color: #007BFF;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    .social-icons {
      margin-top: 5px;
    }

    .social-icons a {
      margin: 0 8px;
      display: inline-block;
    }

    .social-icons img {
      width: 28px;
      height: 28px;
      filter: grayscale(100%) brightness(0);
      transition: filter 0.3s ease;
    }

    .social-icons img:hover {
      filter: none;
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
        align-items: center;
      }

      .card {
        width: 90%;
      }

      .search-container {
        width: 90%;
      }
    }
  </style>
</head>
<body>

  <div class="header">
    <img src="https://static.wikia.nocookie.net/create_mod/images/e/e0/New_Create_Logo_Background.png/revision/latest?cb=20240822183048"
         alt="Create Mod Logo">
    <h1>Information Cards on Class-VIII, Vivekananda</h1>
    <p>Proudly coded by <strong>Tanvir Hasan</strong></p>
  </div>

  <div class="search-bar">
    <div class="search-container">
      <input type="text" id="searchInput" placeholder="Search" oninput="searchCards(); toggleClearBtn(); updateStatusText(); scrollToTop();">
      <span class="clear-btn" id="clearBtn" onclick="clearSearch()"><img src="close.png" height="15" width="15"></span>
    </div>
    <div id="searchStatus" class="search-status"></div>
  </div>

  <div class="container" id="cardContainer">
    <div class="card">
      <div class="card-title">Card Title</div>
      <div class="card-text">This is a short description.</div>
    </div>
    
    <div class="card">
      <div class="card-title">New Card</div>
      <div class="card-text">
        You can keep adding cards, and all of You can keep adding cards. Longer text will scroll inside the card neatly without changing layout.
      </div>
    </div>
  </div>

  <div class="footer">
    <p>Made with ❤️ by <a href="https://www.instagram.com/404.bitrow.notfound/">Tanvir Hasan</a></p>
    <div class="social-icons">
      <a href="https://github.com/bitr0w" target="_blank">
        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/github/github-original.svg" alt="GitHub">
      </a>
      <a href="https://www.instagram.com/404.bitrow.notfound/" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/174/174855.png" alt="Instagram">
      </a>
    </div>
  </div>

  <script>
    function searchCards() {
      const input = document.getElementById("searchInput").value.toLowerCase();
      const cards = document.querySelectorAll(".card");

      cards.forEach(card => {
        const title = card.querySelector(".card-title").textContent.toLowerCase();
        const text = card.querySelector(".card-text").textContent.toLowerCase();
        card.style.display = (title.includes(input) || text.includes(input)) ? "flex" : "none";
      });
    }

    function clearSearch() {
      const input = document.getElementById("searchInput");
      input.value = "";
      searchCards();
      toggleClearBtn();
      updateStatusText();
    }

    function toggleClearBtn() {
      const input = document.getElementById("searchInput");
      const clearBtn = document.getElementById("clearBtn");
      clearBtn.style.display = input.value ? "block" : "none";
    }

    function updateStatusText() {
      const input = document.getElementById("searchInput").value.trim();
      const status = document.getElementById("searchStatus");
      if (input) {
        status.innerText = `You searched for "${input}"`;
        status.style.display = "block";
      } else {
        status.style.display = "none";
      }
    }

    function scrollToTop() {
      window.scrollTo({
        top: 0,
        behavior: 'smooth'
      });
    }

    window.addEventListener("DOMContentLoaded", () => {
      toggleClearBtn();
      updateStatusText();
    });
  </script>

</body>
</html>
